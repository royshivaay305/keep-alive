name: Supabase Keep-Alive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */3 * *"

jobs:
  ping-projects:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run keep-alive pings
        env:
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
        run: npm run keepalive
